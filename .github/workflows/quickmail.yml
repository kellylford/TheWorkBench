name: QuickMail

on:
  push:
    branches: [main]
    tags: ['quickmail/v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish QuickMail/QuickMail/QuickMail.csproj -c Release -o publish/
        # PublishSingleFile, SelfContained, RuntimeIdentifier, ReadyToRun are set in .csproj

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickMail-win-x64
          path: publish/QuickMail.exe
          if-no-files-found: error

      # Create a GitHub Release when a version tag is pushed (e.g. quickmail/v1.2.0)
      - name: Release
        if: startsWith(github.ref, 'refs/tags/quickmail/v')
        uses: softprops/action-gh-release@v2
        with:
          name: QuickMail ${{ github.ref_name }}
          files: publish/QuickMail.exe
          generate_release_notes: true
