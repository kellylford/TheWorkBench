name: Publish Guide from Markdown

on:
  push:
    paths:
      - 'devdocs/CONTROLLING_IPHONE_FROM_MAC.md'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: '3.1.11'

      - name: Convert Markdown to HTML
        run: |
          pandoc \
            --from markdown+smart \
            --to html5 \
            --template .github/pandoc-template.html5 \
            --standalone \
            devdocs/CONTROLLING_IPHONE_FROM_MAC.md \
            --output controlling-iphone-from-mac.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          destination_dir: devdocs
          keep_files: true
          include_files: controlling-iphone-from-mac.html
          commit_message: "Publish: controlling-iphone-from-mac.html from markdown"
